<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="wjcing — projects ledger." />
    <meta name="theme-color" content="#050505" />
    <title>Projects · wjcing</title>
    <script src="./scripts/theme.js"></script>
    <link rel="stylesheet" href="./styles/shared.css" />
    <link rel="stylesheet" href="./styles/projects.css" />
  </head>
  <body data-page="projects">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 19 7v10l-7 4-7-4V7Z"></path>
          </svg>
          <span class="brand-name">wjcing</span>
        </a>

        <nav class="nav" aria-label="Site sections">
          <a class="nav-link" href="./index.html">Home</a>
          <a class="nav-link" href="./about.html">About</a>
          <a class="nav-link is-active" href="./projects.html">Projects</a>
          <a class="nav-link" href="./contact.html">Contact</a>
        </nav>

        <div class="session-cluster">
          <div class="status-chip"><span class="status-dot" aria-hidden="true"></span>Available</div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light mode">
            <svg class="theme-toggle-icon theme-toggle-icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z"></path>
            </svg>
            <svg class="theme-toggle-icon theme-toggle-icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 3v2"></path><path d="M12 19v2"></path>
              <path d="M3 12h2"></path><path d="M19 12h2"></path>
              <path d="m5.6 5.6 1.4 1.4"></path><path d="m17 17 1.4 1.4"></path>
              <path d="m5.6 18.4 1.4-1.4"></path><path d="m17 7 1.4-1.4"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="page-main" aria-label="Projects">
        <div class="section-wrap">
          <div class="section-head">
            <div class="section-kicker">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <ellipse cx="12" cy="5.5" rx="7" ry="3"></ellipse>
                <path d="M5 5.5v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
                <path d="M5 11.5v7c0 1.7 3.1 3 7 3s7-1.3 7-3v-7"></path>
              </svg>
              <h1>Project Ledger.</h1>
            </div>
            <span class="kicker-label" id="projectsCount">Loading…</span>
          </div>

          <p class="section-copy">
            Synced from GitHub in real time, sorted by most recent update.
            Private repos and forks are filtered out.
          </p>

          <section class="data-grid" aria-label="GitHub repositories">
            <header class="grid-head" role="row">
              <div>Project</div>
              <div>Language</div>
              <div>Stars</div>
              <div>Updated</div>
              <div>Repo</div>
            </header>
            <div id="projectsBody">
              <div class="grid-loading">
                <span class="skeleton" style="width: 60%; height: 18px"></span>
                <br /><br />
                Pulling from GitHub…
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="site-foot">© 2026 wjcing — Crafted in the dark.</footer>
    </div>
    <script src="./scripts/projects.js"></script>
  </body>
</html>
